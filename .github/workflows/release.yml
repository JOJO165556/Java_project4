name: Build & Release

on:
  push:
    tags:
      - 'v*'   # Déclenché sur les tags du type v1.0.0, v2.1.3, etc.

permissions:
  contents: write  # Nécessaire pour créer une Release GitHub

jobs:
  # ── Job 1 : Build Linux (.deb et .rpm) ──────────────────────────────────
  build-linux:
    name: Package Linux (deb + rpm)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Ant
        run: sudo apt-get install -y ant

      - name: Dépendances RPM (fakeroot + rpm)
        run: sudo apt-get install -y rpm fakeroot binutils

      - name: Build JAR
        run: ant jar

      - name: Copier data/ dans dist/ (requis par jpackage)
        run: |
          mkdir -p dist/data
          cp -r data/gestion_restaurant.db dist/data/
          cp -r data/icon.png dist/data/

      - name: Package Linux (DEB & RPM)
        run: |
          # On nettoie la version (v1.0.0 -> 1.0.0)
          CLEAN_VERSION=$(echo "${{ github.ref_name }}" | sed 's/v//g')

          # On crée explicitement le dossier de destination
          mkdir -p build/pkg-linux

          # Génération du DEB (nom en minuscules requis par Debian)
          jpackage \
            --input dist \
            --name gestionrestaurant \
            --main-jar GestionRestaurant.jar \
            --main-class com.restaurant.Main \
            --type deb \
            --dest build/pkg-linux \
            --vendor "RestaurantApp" \
            --description "Application de gestion de restaurant" \
            --app-version $CLEAN_VERSION \
            --linux-shortcut \
            --linux-app-category "Office" \
            --java-options "-Dfile.encoding=UTF-8"

          # Génération du RPM (nom en minuscules obligatoire pour RPM)
          jpackage \
            --input dist \
            --name gestionrestaurant \
            --main-jar GestionRestaurant.jar \
            --main-class com.restaurant.Main \
            --type rpm \
            --dest build/pkg-linux \
            --vendor "RestaurantApp" \
            --description "Application de gestion de restaurant" \
            --app-version $CLEAN_VERSION \
            --linux-shortcut \
            --linux-app-category "Office" \
            --java-options "-Dfile.encoding=UTF-8"

      - name: Upload artifacts Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          # On uploade tout le dossier pour éviter les erreurs de wildcard
          path: build/pkg-linux/

  # ── Job 2 : Build Windows (.exe) ────────────────────────────────────────
  build-windows:
    name: Package Windows (exe)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Ant
        uses: cedx/setup-ant@v2
        with:
          version: latest

      - name: WiX Toolset (requis par jpackage pour .exe)
        run: |
          choco install wixtoolset -y
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Build JAR
        run: ant jar

      - name: Copier data/ dans dist/ (requis par jpackage)
        run: |
          New-Item -ItemType Directory -Force -Path dist\data
          Copy-Item data\gestion_restaurant.db dist\data\
          Copy-Item data\icon.png dist\data\
        shell: pwsh

      - name: Package .exe
        run: |
          # Nettoyage de la version pour Windows (ex: v1.0.0 -> 1.0.0)
          $CleanVersion = "${{ github.ref_name }}".Replace("v", "")

          # Répertoire temporaire dédié pour sqlite-jdbc (extraction des DLLs natives)
          $TmpDir = "$env:APPDATA\GestionRestaurant\tmp"
          New-Item -ItemType Directory -Force -Path $TmpDir | Out-Null

          # Création du dossier de sortie
          New-Item -ItemType Directory -Force -Path build\pkg-windows

          jpackage `
            --input dist `
            --name GestionRestaurant `
            --main-jar GestionRestaurant.jar `
            --main-class com.restaurant.Main `
            --type exe `
            --dest build\pkg-windows `
            --vendor "RestaurantApp" `
            --description "Application de gestion de restaurant" `
            --app-version $CleanVersion `
            --java-options '"-Dfile.encoding=UTF-8"' `
            --java-options '"-Djava.io.tmpdir=$APPDATA\GestionRestaurant\tmp"' `
            --win-shortcut `
            --win-menu `
            --win-dir-chooser
        shell: pwsh

      - name: Upload artifact Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: build\pkg-windows\

  # ── Job 3 : Création de la GitHub Release ───────────────────────────────
  release:
    name: Créer la Release GitHub
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Créer la Release et uploader les packages
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "GestionRestaurant ${{ github.ref_name }}"
          body: |
            ## 📦 GestionRestaurant ${{ github.ref_name }}

            ### Téléchargements
            - 🐧 **Linux** : Paquets `.deb` (Ubuntu/Debian) et `.rpm` (Fedora/RHEL)
            - 🪟 **Windows** : Installateur `.exe` avec raccourci bureau

            ### Installation
            - **Debian/Ubuntu** : `sudo dpkg -i gestionrestaurant_*.deb`
            - **Fedora/RHEL** : `sudo rpm -i gestionrestaurant-*.rpm`
            - **Windows** : Lancez le `.exe` et suivez les instructions.
          draft: false
          prerelease: false
          files: artifacts/*
